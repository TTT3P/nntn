<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="/nntn/auth.js"></script>
  <title>รายงานสต๊อก — NNTN</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --green-dark: #1B5E20; --green: #4CAF50;
      --red: #C62828; --orange: #E65100; --blue: #1565C0;
      --bg: #F1F8E9; --border: #e0e0e0; --muted: #757575;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Sarabun', sans-serif; background: var(--bg); color: #212121; font-size: 15px; padding-bottom: 48px; }

    header {
      background: var(--green-dark); color: white;
      padding: 14px 16px; position: sticky; top: 0; z-index: 20;
      box-shadow: 0 2px 6px rgba(0,0,0,.2);
      display: flex; align-items: center; gap: 12px;
    }
    header h1 { font-size: 19px; font-weight: 700; }
    header p  { font-size: 12px; opacity: .7; margin-top: 2px; }
    .back { color: rgba(255,255,255,.8); text-decoration: none; font-size: 26px;
            min-width: 44px; min-height: 44px; display: flex; align-items: center; }
    .back:hover { color: #fff; }

    /* Summary cards */
    .sum-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; padding: 12px 14px; }
    .sum-card { background: #fff; border-radius: 10px; padding: 10px 8px; text-align: center;
                box-shadow: 0 1px 3px rgba(0,0,0,.07); }
    .sum-val   { font-size: 24px; font-weight: 700; }
    .sum-label { font-size: 11px; color: var(--muted); margin-top: 2px; line-height: 1.3; }
    .sum-card.c-red    .sum-val { color: var(--red); }
    .sum-card.c-green  .sum-val { color: var(--green-dark); }
    .sum-card.c-orange .sum-val { color: var(--orange); }

    /* Tabs */
    .tabs { display: flex; background: #fff; border-bottom: 2px solid var(--border);
            padding: 0 14px; position: sticky; top: 58px; z-index: 19; overflow-x: auto; }
    .tabs::-webkit-scrollbar { display: none; }
    .tab-btn { flex-shrink: 0; padding: 10px 14px; font-family: 'Sarabun', sans-serif;
               font-size: 14px; font-weight: 600; border: none; background: none; cursor: pointer;
               color: var(--muted); border-bottom: 3px solid transparent; margin-bottom: -2px; }
    .tab-btn.active { color: var(--green-dark); border-bottom-color: var(--green-dark); }

    .content { padding: 0 14px; }
    .tab-pane { display: none; padding-top: 2px; }
    .tab-pane.active { display: block; }

    /* Chips */
    .chip-row { display: flex; gap: 6px; overflow-x: auto; padding: 10px 0 8px; scrollbar-width: none; }
    .chip-row::-webkit-scrollbar { display: none; }
    .chip { flex-shrink: 0; padding: 5px 12px; border-radius: 20px; font-family: 'Sarabun', sans-serif;
            font-size: 13px; font-weight: 600; border: 1px solid var(--border); background: #fff;
            cursor: pointer; color: #555; white-space: nowrap; }
    .chip.active { background: var(--green-dark); color: #fff; border-color: var(--green-dark); }

    /* Search */
    .search-box { width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: 8px;
                  font-family: 'Sarabun', sans-serif; font-size: 14px; background: #fff; margin-bottom: 8px; }

    /* Sub-filter pills */
    .sf-row { display: flex; gap: 6px; padding: 8px 0; }
    .sf-pill { padding: 5px 14px; border-radius: 20px; font-family: 'Sarabun', sans-serif;
               font-size: 13px; font-weight: 600; border: 1px solid var(--border);
               background: #fff; cursor: pointer; color: #555; }
    .sf-pill.active { background: var(--blue); color: #fff; border-color: var(--blue); }

    /* Table */
    .tbl-wrap { overflow-x: auto; border-radius: 10px; box-shadow: 0 1px 3px rgba(0,0,0,.07); }
    table { width: 100%; border-collapse: collapse; background: #fff; }
    thead th { background: #f5f5f5; font-size: 12px; font-weight: 700; color: #555;
               padding: 9px 10px; text-align: left; cursor: pointer; user-select: none;
               white-space: nowrap; border-bottom: 1px solid var(--border); }
    thead th:hover { background: #eeeeee; }
    thead th.asc::after  { content: ' ▲'; font-size: 9px; }
    thead th.desc::after { content: ' ▼'; font-size: 9px; }
    tbody td { padding: 9px 10px; border-bottom: 1px solid #f0f0f0; font-size: 14px; vertical-align: middle; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: #fafafa; }
    .td-r  { text-align: right; }
    .td-name { font-weight: 600; }
    .td-sku  { font-size: 11px; color: var(--muted); }

    /* Status chips */
    .sc { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 700; }
    .sc-out   { background: #FFEBEE; color: #C62828; }
    .sc-order { background: #FFF3E0; color: #E65100; }
    .sc-low   { background: #FFF9C4; color: #F57F17; }
    .sc-ok    { background: #E8F5E9; color: #1B5E20; }

    /* Variance colors */
    .v-neg  { color: var(--red);        font-weight: 700; }
    .v-pos  { color: var(--green-dark); font-weight: 700; }
    .v-zero { color: var(--muted); }

    .empty   { text-align: center; padding: 32px; color: var(--muted); font-size: 14px; }
    .loading { text-align: center; padding: 32px; color: var(--muted); }
  </style>
</head>
<body>

<header>
  <a class="back" href="index.html">←</a>
  <div>
    <h1>📊 รายงานสต๊อก</h1>
    <p id="rpt-date">กำลังโหลด...</p>
  </div>
</header>

<!-- Summary cards -->
<div class="sum-row">
  <div class="sum-card">
    <div class="sum-val" id="s-total">—</div>
    <div class="sum-label">รายการ</div>
  </div>
  <div class="sum-card c-orange">
    <div class="sum-val" id="s-need">—</div>
    <div class="sum-label">ต้องสั่ง / ใกล้หมด</div>
  </div>
  <div class="sum-card c-red">
    <div class="sum-val" id="s-lost">—</div>
    <div class="sum-label">ของหาย</div>
  </div>
  <div class="sum-card c-green">
    <div class="sum-val" id="s-plus">—</div>
    <div class="sum-label">ของงอก</div>
  </div>
</div>

<!-- Tabs -->
<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('all',this)">📋 ทั้งหมด</button>
  <button class="tab-btn"        onclick="switchTab('used',this)">📦 ของที่ใช้</button>
  <button class="tab-btn"        onclick="switchTab('var',this)">⚠️ หาย / งอก</button>
</div>

<div class="content">

<!-- ═══ TAB: ทั้งหมด ═══ -->
<div class="tab-pane active" id="tab-all">
  <div class="chip-row" id="chips-all"></div>
  <input class="search-box" type="text" id="q-all" placeholder="🔍 ค้นหาชื่อหรือ SKU..." oninput="renderAll()">
  <div class="tbl-wrap">
    <table>
      <thead id="thead-all">
        <tr>
          <th onclick="sort('all','name')">ชื่อ</th>
          <th onclick="sort('all','category')">หมวด</th>
          <th onclick="sort('all','qty')" class="td-r">สต๊อก</th>
          <th onclick="sort('all','par')" class="td-r">Par</th>
          <th onclick="sort('all','status')">สถานะ</th>
          <th onclick="sort('all','date')">นับล่าสุด</th>
        </tr>
      </thead>
      <tbody id="tbody-all"><tr><td colspan="6" class="loading">กำลังโหลด...</td></tr></tbody>
    </table>
  </div>
</div>

<!-- ═══ TAB: ของที่ใช้ ═══ -->
<div class="tab-pane" id="tab-used">
  <div class="chip-row" id="chips-used"></div>
  <input class="search-box" type="text" id="q-used" placeholder="🔍 ค้นหา..." oninput="renderUsed()">
  <div class="tbl-wrap">
    <table>
      <thead id="thead-used">
        <tr>
          <th onclick="sort('used','name')">ชื่อ</th>
          <th onclick="sort('used','category')">หมวด</th>
          <th onclick="sort('used','total')" class="td-r">เบิกรวม</th>
          <th onclick="sort('used','times')" class="td-r">ครั้ง</th>
          <th onclick="sort('used','last')">เบิกล่าสุด</th>
        </tr>
      </thead>
      <tbody id="tbody-used"><tr><td colspan="5" class="loading">กำลังโหลด...</td></tr></tbody>
    </table>
  </div>
</div>

<!-- ═══ TAB: หาย / งอก ═══ -->
<div class="tab-pane" id="tab-var">
  <div class="sf-row">
    <button class="sf-pill active" onclick="setVF('all',this)">ทั้งหมด</button>
    <button class="sf-pill"        onclick="setVF('lost',this)">🔴 ของหาย</button>
    <button class="sf-pill"        onclick="setVF('plus',this)">🟢 ของงอก</button>
  </div>
  <div class="tbl-wrap">
    <table>
      <thead>
        <tr>
          <th>ชื่อ</th>
          <th class="td-r">นับครั้งก่อน</th>
          <th class="td-r">ควรเหลือ</th>
          <th class="td-r">นับจริง</th>
          <th class="td-r">ผลต่าง</th>
        </tr>
      </thead>
      <tbody id="tbody-var"><tr><td colspan="5" class="loading">กำลังโหลด...</td></tr></tbody>
    </table>
  </div>
  <div style="font-size:12px;color:var(--muted);padding:10px 2px;">
    * ต้องมีการนับสต๊อกอย่างน้อย 2 ครั้งต่อรายการจึงจะแสดงผล
  </div>
</div>

</div><!-- /content -->

<script>
const SUPABASE_URL = 'https://emjqulzikpxorvpaaiww.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVtanF1bHppa3B4b3J2cGFhaXd3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNTgzNDAsImV4cCI6MjA5MDYzNDM0MH0.BoslF10vIufPYucuHub_czSxzAhZ9u3nTDQjwgC7I5M';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const CAT_LABEL = {
  seasoning:'🧂 เครื่องปรุง', spice:'🌿 สมุนไพร', vegetable:'🥬 ผัก',
  packaging:'📦 แพ็กเกจ', consumable:'🛒 วัสดุ', noodle:'🍜 เส้น',
  srcp:'🥄 Sub-Recipe', pkg:'🛍️ Portioned',
};
const STATUS_CLASS = { OUT:'sc-out', ORDER_NOW:'sc-order', LOW:'sc-low', OK:'sc-ok' };
const STATUS_LABEL = { OUT:'หมด', ORDER_NOW:'ต้องสั่ง', LOW:'ใกล้หมด', OK:'ปกติ' };

let allItems = [];
let sortState = {
  all:  { key:'name',  dir:1 },
  used: { key:'total', dir:-1 },
};
let catFilter = { all:'all', used:'all' };
let varFilter = 'all';

// ─── Data loading ──────────────────────────────────────
async function load() {
  document.getElementById('rpt-date').textContent =
    new Date().toLocaleDateString('th-TH', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

  const [{ data: items }, { data: evts }] = await Promise.all([
    sb.from('items').select('id,sku,name,unit,category,par_level')
      .eq('is_active', true).order('category').order('sku'),
    sb.from('stock_counts').select('item_id,qty,event_type,note,counted_at')
      .order('counted_at', { ascending: true }),
  ]);

  if (!items) return;
  const events = evts || [];

  // Group events by item_id
  const byItem = {};
  events.forEach(e => {
    (byItem[e.item_id] = byItem[e.item_id] || []).push(e);
  });

  allItems = items.map(item => {
    const evs = byItem[item.id] || [];

    // ── Current stock: latest event's qty ──
    const latestEv   = evs.length ? evs[evs.length - 1] : null;
    const currentQty = latestEv ? parseFloat(latestEv.qty) : null;

    // ── Last count date ──
    const lastCountEv = [...evs].reverse().find(e => e.event_type === 'count');
    const lastCountAt = lastCountEv ? lastCountEv.counted_at : null;

    // ── Dispense summary ──
    const dispEvs = evs.filter(e => e.event_type === 'dispense');
    // Parse dispensed amount from note: "เบิก X unit"
    const totalDispensed = dispEvs.reduce((sum, e) => {
      const m = e.note && e.note.match(/เบิก\s+([\d.]+)/);
      return sum + (m ? parseFloat(m[1]) : 0);
    }, 0);
    const lastDispAt = dispEvs.length ? dispEvs[dispEvs.length - 1].counted_at : null;

    // ── Variance: compare last 2 physical counts ──
    const countEvs = evs.filter(e => e.event_type === 'count');
    let variance = null, prevQty = null, expectedQty = null, currQtyForVar = null;
    if (countEvs.length >= 2) {
      const prev = countEvs[countEvs.length - 2];
      const curr = countEvs[countEvs.length - 1];
      // Non-count events between prev and curr counts
      const between = evs.filter(e =>
        e.event_type !== 'count' &&
        e.counted_at > prev.counted_at &&
        e.counted_at <= curr.counted_at
      );
      // Expected = last balance snapshot before current count (from dispense/loss/etc.)
      // If nothing between, expected = prev count qty
      const lastBetween = between.length ? between[between.length - 1] : null;
      expectedQty   = lastBetween ? parseFloat(lastBetween.qty) : parseFloat(prev.qty);
      prevQty       = parseFloat(prev.qty);
      currQtyForVar = parseFloat(curr.qty);
      variance      = Math.round((currQtyForVar - expectedQty) * 100) / 100;
    }

    const status = currentQty !== null
      ? (currentQty === 0 ? 'OUT'
        : currentQty < (item.par_level || 0) ? 'ORDER_NOW'
        : currentQty < (item.par_level || 0) * 1.5 ? 'LOW' : 'OK')
      : 'OUT';

    return {
      ...item,
      currentQty,
      lastCountAt,
      totalDispensed: Math.round(totalDispensed * 100) / 100,
      dispenseCount: dispEvs.length,
      lastDispAt,
      variance,
      prevQty,
      expectedQty,
      currQtyForVar,
      status,
    };
  });

  buildSummary();
  buildChips();
  renderAll();
  renderUsed();
  renderVar();
}

function buildSummary() {
  document.getElementById('s-total').textContent = allItems.length;
  document.getElementById('s-need').textContent =
    allItems.filter(i => i.status === 'OUT' || i.status === 'ORDER_NOW' || i.status === 'LOW').length;
  document.getElementById('s-lost').textContent =
    allItems.filter(i => i.variance !== null && i.variance < 0).length;
  document.getElementById('s-plus').textContent =
    allItems.filter(i => i.variance !== null && i.variance > 0).length;
}

// ─── Sort helper ───────────────────────────────────────
function sort(tab, key) {
  const s = sortState[tab];
  s.dir = s.key === key ? s.dir * -1 : (key === 'qty' || key === 'total' || key === 'times' || key === 'par' ? -1 : 1);
  s.key = key;
  // Update header classes
  const colMap = {
    all:  ['name','category','qty','par','status','date'],
    used: ['name','category','total','times','last'],
  };
  const ths = document.querySelectorAll(`#thead-${tab} th`);
  ths.forEach((th, i) => {
    th.classList.remove('asc','desc');
    if (colMap[tab][i] === key) th.classList.add(s.dir === 1 ? 'asc' : 'desc');
  });
  tab === 'all' ? renderAll() : renderUsed();
}

function fmtDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString('th-TH', { day:'numeric', month:'short' });
}

// ─── Tab: ทั้งหมด ───────────────────────────────────────
function renderAll() {
  const q   = document.getElementById('q-all').value.toLowerCase();
  const cat = catFilter.all;
  const KEY_MAP = { name:'name', category:'category', qty:'currentQty', par:'par_level', status:'status', date:'lastCountAt' };
  const { key, dir } = sortState.all;
  const k = KEY_MAP[key] || 'name';

  let data = allItems.filter(i =>
    (cat === 'all' || i.category === cat) &&
    (!q || i.name.toLowerCase().includes(q) || i.sku.toLowerCase().includes(q))
  ).sort((a, b) => {
    const va = a[k] ?? '', vb = b[k] ?? '';
    return va < vb ? -dir : va > vb ? dir : 0;
  });

  const tbody = document.getElementById('tbody-all');
  if (!data.length) { tbody.innerHTML = '<tr><td colspan="6" class="empty">ไม่มีรายการ</td></tr>'; return; }
  tbody.innerHTML = data.map(i => `
    <tr>
      <td><div class="td-name">${i.name}</div><div class="td-sku">${i.sku}</div></td>
      <td>${CAT_LABEL[i.category] || i.category || '—'}</td>
      <td class="td-r">${i.currentQty !== null ? i.currentQty + ' ' + i.unit : '—'}</td>
      <td class="td-r">${i.par_level ?? '—'}</td>
      <td><span class="sc ${STATUS_CLASS[i.status] || ''}">${STATUS_LABEL[i.status] || '—'}</span></td>
      <td>${fmtDate(i.lastCountAt)}</td>
    </tr>`).join('');
}

// ─── Tab: ของที่ใช้ ─────────────────────────────────────
function renderUsed() {
  const q   = document.getElementById('q-used').value.toLowerCase();
  const cat = catFilter.used;
  const KEY_MAP = { name:'name', category:'category', total:'totalDispensed', times:'dispenseCount', last:'lastDispAt' };
  const { key, dir } = sortState.used;
  const k = KEY_MAP[key] || 'totalDispensed';

  let data = allItems.filter(i =>
    i.dispenseCount > 0 &&
    (cat === 'all' || i.category === cat) &&
    (!q || i.name.toLowerCase().includes(q))
  ).sort((a, b) => {
    const va = a[k] ?? 0, vb = b[k] ?? 0;
    return va < vb ? -dir : va > vb ? dir : 0;
  });

  const tbody = document.getElementById('tbody-used');
  if (!data.length) { tbody.innerHTML = '<tr><td colspan="5" class="empty">ไม่มีข้อมูลการเบิก</td></tr>'; return; }
  tbody.innerHTML = data.map(i => `
    <tr>
      <td><div class="td-name">${i.name}</div><div class="td-sku">${i.sku}</div></td>
      <td>${CAT_LABEL[i.category] || i.category || '—'}</td>
      <td class="td-r">${i.totalDispensed > 0 ? i.totalDispensed + ' ' + i.unit : '(' + i.dispenseCount + ' ครั้ง)'}</td>
      <td class="td-r">${i.dispenseCount}</td>
      <td>${fmtDate(i.lastDispAt)}</td>
    </tr>`).join('');
}

// ─── Tab: หาย / งอก ────────────────────────────────────
function setVF(f, el) {
  varFilter = f;
  document.querySelectorAll('.sf-pill').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderVar();
}

function renderVar() {
  let data = allItems.filter(i => {
    if (i.variance === null) return false;
    if (varFilter === 'lost') return i.variance < 0;
    if (varFilter === 'plus') return i.variance > 0;
    return i.variance !== 0;
  }).sort((a, b) => Math.abs(b.variance) - Math.abs(a.variance));

  const tbody = document.getElementById('tbody-var');
  if (!data.length) {
    tbody.innerHTML = `<tr><td colspan="5" class="empty">${
      varFilter === 'all' ? 'ไม่พบความผิดปกติ หรือยังมีข้อมูลนับไม่ถึง 2 ครั้ง'
      : 'ไม่มีรายการที่ตรงเงื่อนไข'
    }</td></tr>`;
    return;
  }
  tbody.innerHTML = data.map(i => {
    const vc = i.variance < 0 ? 'v-neg' : i.variance > 0 ? 'v-pos' : 'v-zero';
    const vs = i.variance > 0 ? '+' : '';
    return `<tr>
      <td><div class="td-name">${i.name}</div><div class="td-sku">${i.sku}</div></td>
      <td class="td-r">${i.prevQty} ${i.unit}</td>
      <td class="td-r">${i.expectedQty} ${i.unit}</td>
      <td class="td-r">${i.currQtyForVar} ${i.unit}</td>
      <td class="td-r ${vc}">${vs}${i.variance} ${i.unit}</td>
    </tr>`;
  }).join('');
}

// ─── Category chips ─────────────────────────────────────
function buildChips() {
  const cats = ['all', ...new Set(allItems.map(i => i.category).filter(Boolean))];
  ['all','used'].forEach(tab => {
    const el = document.getElementById('chips-' + tab);
    el.innerHTML = cats.map(c => {
      const label = c === 'all' ? 'ทั้งหมด' : (CAT_LABEL[c] || c);
      return `<button class="chip${catFilter[tab] === c ? ' active':''}"
        onclick="setCat('${tab}','${c}')">${label}</button>`;
    }).join('');
  });
}

function setCat(tab, cat) {
  catFilter[tab] = cat;
  buildChips();
  tab === 'all' ? renderAll() : renderUsed();
}

// ─── Tab switching ───────────────────────────────────────
function switchTab(tab, el) {
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b  => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  el.classList.add('active');
}

load();
</script>
</body>
</html>
