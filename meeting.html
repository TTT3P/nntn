<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meeting Room — NNTN Holding</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --border: #30363d;
    --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff;
    --croo: #3fb950; --gemini: #d2a8ff; --codex: #f0883e; --tine: #58a6ff;
    --consensus: #3fb950; --summary: #f0c674;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }

  header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 18px; font-weight: 600; }
  header .room-badge { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 2px 10px; font-size: 12px; color: var(--muted); }
  header .actions { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  header .btn-action { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 6px 12px; color: var(--muted); font-size: 12px; cursor: pointer; }
  header .btn-action:hover { border-color: var(--accent); color: var(--accent); }
  header .status { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--muted); }
  header .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--croo); }

  /* Round progress bar */
  .round-bar { display: none; padding: 8px 20px; border-bottom: 1px solid var(--border); background: var(--surface); }
  .round-bar.active { display: flex; align-items: center; gap: 12px; }
  .round-steps { display: flex; gap: 4px; flex: 1; }
  .round-step { flex: 1; height: 4px; border-radius: 2px; background: var(--border); transition: background 0.3s; }
  .round-step.done { background: var(--accent); }
  .round-step.current { background: var(--accent); animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
  .round-label { font-size: 12px; color: var(--muted); white-space: nowrap; }

  #messages { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 4px; }

  .msg { display: flex; gap: 10px; padding: 6px 0; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .msg .avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; font-weight: 700; }
  .msg .body { flex: 1; min-width: 0; }
  .msg .meta { display: flex; align-items: baseline; gap: 8px; margin-bottom: 2px; }
  .msg .name { font-weight: 600; font-size: 14px; }
  .msg .time { font-size: 11px; color: var(--muted); }
  .msg .text { font-size: 14px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
  .msg .mention { color: var(--accent); font-weight: 600; }

  .msg[data-speaker="croo"] .avatar { background: var(--croo); color: #000; }
  .msg[data-speaker="croo"] .name { color: var(--croo); }
  .msg[data-speaker="gemini"] .avatar { background: var(--gemini); color: #000; }
  .msg[data-speaker="gemini"] .name { color: var(--gemini); }
  .msg[data-speaker="codex"] .avatar { background: var(--codex); color: #000; }
  .msg[data-speaker="codex"] .name { color: var(--codex); }
  .msg[data-speaker="tine"] .avatar { background: var(--tine); color: #000; }
  .msg[data-speaker="tine"] .name { color: var(--tine); }

  /* Consensus message */
  .msg.consensus { border-left: 3px solid var(--consensus); padding-left: 12px; margin: 8px 0; background: rgba(63,185,80,0.05); border-radius: 0 8px 8px 0; }
  .msg.consensus .badge { display: inline-block; background: var(--consensus); color: #000; font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 4px; margin-right: 6px; }

  /* Summary message */
  .msg.summary { border-left: 3px solid var(--summary); padding-left: 12px; margin: 8px 0; background: rgba(240,198,116,0.05); border-radius: 0 8px 8px 0; }
  .msg.summary .badge { display: inline-block; background: var(--summary); color: #000; font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 4px; margin-right: 6px; }

  /* Typing indicator */
  .typing-bar { padding: 4px 20px; min-height: 24px; font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
  .typing-dot { display: inline-flex; gap: 3px; }
  .typing-dot span { width: 4px; height: 4px; border-radius: 50%; background: var(--muted); animation: typeBounce 1.2s infinite; }
  .typing-dot span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typeBounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-4px); } }

  .separator { text-align: center; color: var(--muted); font-size: 12px; padding: 12px 0; }

  footer { border-top: 1px solid var(--border); }
  .input-row { display: flex; gap: 8px; padding: 12px 20px; }
  .input-row input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; color: var(--text); font-size: 14px; outline: none; }
  .input-row input:focus { border-color: var(--accent); }
  .input-row button { background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: 10px 20px; font-size: 14px; font-weight: 600; cursor: pointer; }
  .input-row button:hover { opacity: 0.9; }
  .input-hints { padding: 0 20px 8px; font-size: 11px; color: var(--muted); }

  .room-select { display: flex; gap: 8px; padding: 8px 20px; border-bottom: 1px solid var(--border); background: var(--surface); flex-wrap: wrap; }
  .room-btn { background: none; border: 1px solid var(--border); border-radius: 16px; padding: 4px 14px; color: var(--muted); font-size: 13px; cursor: pointer; }
  .room-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(88,166,255,0.1); }

  .empty { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 14px; }
</style>
</head>
<body>

<header>
  <h1>Meeting Room</h1>
  <span class="room-badge" id="room-label">general</span>
  <div class="actions">
    <button class="btn-action" id="btn-round" title="Start structured rounds">Rounds</button>
    <button class="btn-action" id="btn-minutes" title="Save meeting minutes">Minutes</button>
    <div class="status"><div class="dot"></div> Live</div>
  </div>
</header>

<div class="round-bar" id="round-bar">
  <div class="round-steps">
    <div class="round-step" id="rs1"></div>
    <div class="round-step" id="rs2"></div>
    <div class="round-step" id="rs3"></div>
  </div>
  <span class="round-label" id="round-label">Round 1/3 — Independent</span>
</div>

<div class="room-select" id="room-tabs"></div>

<div id="messages">
  <div class="empty" id="empty-state">waiting for messages...</div>
</div>

<div class="typing-bar" id="typing-bar"></div>

<footer>
  <div class="input-row">
    <input type="text" id="input" placeholder="พิมพ์ข้อความ (ส่งในนาม TINE)..." autocomplete="off">
    <button id="send">Send</button>
  </div>
  <div class="input-hints">@ชื่อ = mention &nbsp;|&nbsp; [consensus] = mark consensus &nbsp;|&nbsp; [summary] = chairman summary</div>
</footer>

<script>
const SUPABASE_URL = 'https://emjqulzikpxorvpaaiww.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVtanF1bHppa3B4b3J2cGFhaXd3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNTgzNDAsImV4cCI6MjA5MDYzNDM0MH0.BoslF10vIufPYucuHub_czSxzAhZ9u3nTDQjwgC7I5M';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const roomLabel = document.getElementById('room-label');
const roomTabs = document.getElementById('room-tabs');
const typingBar = document.getElementById('typing-bar');
const roundBar = document.getElementById('round-bar');

let currentRoom = new URLSearchParams(location.search).get('room') || 'general';
let rooms = new Set(['general']);
let currentRound = 0;
let typingTimers = {};

const AVATARS = { croo: 'C', gemini: 'G', codex: 'X', tine: 'T' };
const NAMES = { croo: 'CROO', gemini: 'Gemini', codex: 'Codex', tine: 'TINE' };
const ROUND_LABELS = ['', 'Round 1/3 — Independent', 'Round 2/3 — Debate', 'Round 3/3 — Synthesis'];

function formatTime(ts) {
  const d = new Date(ts);
  return d.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

function highlightMentions(text) {
  return text.replace(/@(croo|gemini|codex|tine)/gi, (m, name) => {
    const sp = name.toLowerCase();
    const color = `var(--${sp})`;
    return `<span class="mention" style="color:${color}">@${NAMES[sp] || name}</span>`;
  });
}

function detectMessageType(msg) {
  const t = msg.message.toLowerCase();
  if (t.startsWith('[consensus]')) return 'consensus';
  if (t.startsWith('[summary]')) return 'summary';
  return 'normal';
}

function addMessage(msg) {
  if (msg.room !== currentRoom) {
    rooms.add(msg.room);
    renderTabs();
    return;
  }
  document.getElementById('empty-state')?.remove();

  const type = detectMessageType(msg);
  const el = document.createElement('div');
  el.className = 'msg' + (type !== 'normal' ? ' ' + type : '');
  el.dataset.speaker = msg.speaker;
  const sp = msg.speaker.toLowerCase();

  let displayMsg = msg.message;
  if (type === 'consensus') displayMsg = displayMsg.replace(/^\[consensus\]\s*/i, '');
  if (type === 'summary') displayMsg = displayMsg.replace(/^\[summary\]\s*/i, '');

  const badgeHtml = type === 'consensus' ? '<span class="badge">CONSENSUS</span>'
    : type === 'summary' ? '<span class="badge">SUMMARY</span>' : '';

  el.innerHTML = `
    <div class="avatar">${AVATARS[sp] || sp[0].toUpperCase()}</div>
    <div class="body">
      <div class="meta">
        <span class="name">${NAMES[sp] || msg.speaker}</span>
        <span class="time">${formatTime(msg.created_at)}</span>
      </div>
      <div class="text">${badgeHtml}${highlightMentions(escapeHtml(displayMsg))}</div>
    </div>
  `;
  messagesEl.appendChild(el);
  messagesEl.scrollTop = messagesEl.scrollHeight;

  // Clear typing indicator for this speaker
  clearTyping(sp);
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// --- Typing indicator ---
function showTyping(speaker) {
  typingTimers[speaker] = Date.now();
  renderTyping();
  setTimeout(() => { if (Date.now() - typingTimers[speaker] >= 9500) { clearTyping(speaker); } }, 10000);
}

function clearTyping(speaker) {
  delete typingTimers[speaker];
  renderTyping();
}

function renderTyping() {
  const active = Object.keys(typingTimers);
  if (active.length === 0) { typingBar.innerHTML = ''; return; }
  const names = active.map(s => NAMES[s] || s).join(', ');
  typingBar.innerHTML = `<div class="typing-dot"><span></span><span></span><span></span></div> ${names} กำลังพิมพ์...`;
}

// --- Rounds ---
function setRound(n) {
  currentRound = n;
  if (n === 0) { roundBar.classList.remove('active'); return; }
  roundBar.classList.add('active');
  for (let i = 1; i <= 3; i++) {
    const step = document.getElementById('rs' + i);
    step.className = 'round-step' + (i < n ? ' done' : i === n ? ' current' : '');
  }
  document.getElementById('round-label').textContent = ROUND_LABELS[n] || '';
}

function cycleRound() {
  const next = (currentRound + 1) % 4;
  setRound(next);
  if (next > 0) {
    sb.from('meeting_messages').insert({
      room: currentRoom, speaker: 'system',
      message: `--- ${ROUND_LABELS[next]} ---`
    });
  }
}

// --- Room management ---
function renderTabs() {
  roomTabs.innerHTML = '';
  for (const r of rooms) {
    const btn = document.createElement('button');
    btn.className = 'room-btn' + (r === currentRoom ? ' active' : '');
    btn.textContent = r;
    btn.onclick = () => switchRoom(r);
    roomTabs.appendChild(btn);
  }
}

async function switchRoom(room) {
  currentRoom = room;
  roomLabel.textContent = room;
  messagesEl.innerHTML = '<div class="empty" id="empty-state">loading...</div>';
  renderTabs();
  setRound(0);
  await loadMessages();
  history.replaceState(null, '', '?room=' + room);
}

async function loadMessages() {
  const { data } = await sb.from('meeting_messages')
    .select('*').eq('room', currentRoom)
    .order('created_at', { ascending: true }).limit(200);

  messagesEl.innerHTML = '';
  if (!data || data.length === 0) {
    messagesEl.innerHTML = '<div class="empty">waiting for messages...</div>';
    return;
  }
  data.forEach(addMessage);
}

async function loadRooms() {
  const { data } = await sb.from('meeting_messages')
    .select('room').order('created_at', { ascending: false });
  if (data) data.forEach(r => rooms.add(r.room));
  renderTabs();
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text) return;
  inputEl.value = '';
  await sb.from('meeting_messages').insert({
    room: currentRoom, speaker: 'tine', message: text
  });
}

// --- Realtime ---
sb.channel('meeting-realtime')
  .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'meeting_messages' }, (payload) => {
    addMessage(payload.new);
    rooms.add(payload.new.room);
    renderTabs();
  })
  .subscribe();

// --- Minutes export ---
async function saveMinutes() {
  const { data } = await sb.from('meeting_messages')
    .select('*').eq('room', currentRoom)
    .order('created_at', { ascending: true });

  if (!data || data.length === 0) { alert('No messages to save'); return; }

  const speakers = [...new Set(data.map(m => m.speaker))];
  const first = new Date(data[0].created_at);
  const last = new Date(data[data.length - 1].created_at);
  const dur = Math.round((last - first) / 60000);

  const consensusItems = data.filter(m => m.message.toLowerCase().startsWith('[consensus]'));
  const summaryItems = data.filter(m => m.message.toLowerCase().startsWith('[summary]'));

  let md = `# Meeting Minutes — ${currentRoom}\n\n`;
  md += `**Date:** ${first.toLocaleDateString('th-TH', { year: 'numeric', month: 'long', day: 'numeric' })}\n`;
  md += `**Time:** ${first.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' })} — ${last.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' })} (${dur} min)\n`;
  md += `**Participants:** ${speakers.map(s => (NAMES[s] || s)).join(', ')}\n`;
  md += `**Messages:** ${data.length}\n\n`;

  if (consensusItems.length > 0) {
    md += `## Consensus Points\n\n`;
    consensusItems.forEach(m => {
      md += `- ${m.message.replace(/^\[consensus\]\s*/i, '')} *(${NAMES[m.speaker] || m.speaker})*\n`;
    });
    md += `\n`;
  }

  if (summaryItems.length > 0) {
    md += `## Chairman Summary\n\n`;
    summaryItems.forEach(m => {
      md += `${m.message.replace(/^\[summary\]\s*/i, '')}\n\n— *${NAMES[m.speaker] || m.speaker}*\n\n`;
    });
  }

  md += `---\n\n## Full Transcript\n\n`;
  data.forEach(m => {
    const t = new Date(m.created_at).toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
    md += `**${NAMES[m.speaker] || m.speaker}** (${t}):\n${m.message}\n\n`;
  });

  md += `---\n*Generated from Meeting Room — ${new Date().toISOString()}*\n`;

  const blob = new Blob([md], { type: 'text/markdown' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `minutes-${currentRoom}-${first.toISOString().slice(0,10)}.md`;
  a.click();
  URL.revokeObjectURL(url);
}

// --- Events ---
document.getElementById('btn-minutes').onclick = saveMinutes;
document.getElementById('btn-round').onclick = cycleRound;
document.getElementById('send').onclick = sendMessage;
inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });

// --- Init ---
roomLabel.textContent = currentRoom;
loadRooms();
loadMessages();
</script>
</body>
</html>
