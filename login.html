<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เข้าสู่ระบบ — NNTN</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Sarabun', sans-serif;
      background: #F1F8E9;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      padding: 36px 28px;
      width: 100%; max-width: 340px;
      text-align: center;
    }
    .logo { font-size: 2.4rem; margin-bottom: 8px; }
    h1 { font-size: 1.2rem; font-weight: 700; color: #1B5E20; }
    .sub { font-size: 0.78rem; color: #757575; margin-top: 4px; margin-bottom: 28px; }

    label { display: block; text-align: left; font-size: 0.82rem; font-weight: 600; color: #424242; margin-bottom: 6px; margin-top: 14px; }
    label:first-of-type { margin-top: 0; }
    input[type="password"], input[type="text"] {
      width: 100%; padding: 13px 14px;
      border: 1.5px solid #C8E6C9; border-radius: 10px;
      font-size: 1rem; font-family: inherit;
      outline: none; transition: border-color 0.15s;
    }
    input[type="password"]:focus, input[type="text"]:focus { border-color: #4CAF50; }
    input[type="password"].error, input[type="text"].error { border-color: #C62828; }

    .error-msg {
      font-size: 0.8rem; color: #C62828;
      margin-top: 8px; min-height: 18px; text-align: left;
    }

    button {
      margin-top: 20px; width: 100%;
      background: #1B5E20; color: white;
      border: none; border-radius: 10px;
      padding: 14px; font-size: 1rem; font-weight: 700;
      font-family: inherit; cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #2E7D32; }
    button:active { background: #1B5E20; transform: scale(0.98); }
    button:disabled { background: #A5D6A7; cursor: not-allowed; }

    .footer { margin-top: 24px; font-size: 0.7rem; color: #BDBDBD; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">🥬</div>
  <h1>NNTN สต๊อกครัว</h1>
  <div class="sub">ครัวเนื้อในตำนาน — กรุณาเข้าสู่ระบบ</div>

  <label for="usr">ชื่อผู้ใช้</label>
  <input type="text" id="usr" placeholder="เช่น tine, tor, aim" autocomplete="off" autocapitalize="none" spellcheck="false">

  <label for="pwd">รหัสผ่าน</label>
  <input type="password" id="pwd" placeholder="••••••••" autocomplete="current-password">
  <div class="error-msg" id="err"></div>

  <button id="btn" onclick="doLogin()">เข้าสู่ระบบ</button>
  <div class="footer">NNTN Stock v2 • สำหรับทีมงานเท่านั้น</div>
</div>

<script>
  var SB           = 'https://emjqulzikpxorvpaaiww.supabase.co';
  var KEY          = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVtanF1bHppa3B4b3J2cGFhaXd3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNTgzNDAsImV4cCI6MjA5MDYzNDM0MH0.BoslF10vIufPYucuHub_czSxzAhZ9u3nTDQjwgC7I5M';
  var EMAIL_DOMAIN = '@nntn.internal';
  var SB_TOKEN_KEY = 'nntn_sb_token';

  // ถ้า login อยู่แล้ว → ไปหน้าหลักเลย
  if (localStorage.getItem(SB_TOKEN_KEY)) {
    var next = new URLSearchParams(location.search).get('next');
    location.replace(next || 'index.html');
  }

  function buildEmail(rawUsername) {
    // Lowercase + trim + strip whitespace; empty → ''
    var u = (rawUsername || '').trim().toLowerCase();
    if (!u) return '';
    // If user already typed full email, use as-is (allow @nntn.internal variations)
    if (u.indexOf('@') !== -1) return u;
    return u + EMAIL_DOMAIN;
  }

  async function doLogin() {
    var usrEl = document.getElementById('usr');
    var pwdEl = document.getElementById('pwd');
    var err   = document.getElementById('err');
    var btn   = document.getElementById('btn');

    var username = usrEl.value;
    var pwd      = pwdEl.value;

    err.textContent = '';
    usrEl.classList.remove('error');
    pwdEl.classList.remove('error');

    if (!username) {
      err.textContent = 'กรุณาใส่ชื่อผู้ใช้';
      usrEl.classList.add('error');
      usrEl.focus();
      return;
    }
    if (!pwd) {
      err.textContent = 'กรุณาใส่รหัสผ่าน';
      pwdEl.classList.add('error');
      pwdEl.focus();
      return;
    }

    var email = buildEmail(username);

    btn.disabled = true;
    btn.textContent = 'กำลังเข้าสู่ระบบ…';

    try {
      var res = await fetch(SB + '/auth/v1/token?grant_type=password', {
        method: 'POST',
        headers: { 'apikey': KEY, 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: email, password: pwd })
      });

      if (!res.ok) {
        err.textContent = 'ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง';
        usrEl.classList.add('error');
        pwdEl.classList.add('error');
        pwdEl.value = '';
        pwdEl.focus();
        return;
      }

      var data = await res.json();
      localStorage.setItem(SB_TOKEN_KEY, data.access_token);
      if (data.refresh_token) localStorage.setItem('nntn_sb_refresh', data.refresh_token);
      if (data.expires_at)    localStorage.setItem('nntn_sb_expires', String(data.expires_at));

      var next = new URLSearchParams(location.search).get('next');
      location.replace(next || 'index.html');

    } catch (e) {
      err.textContent = 'เชื่อมต่อไม่ได้ — ลองใหม่อีกครั้ง';
    } finally {
      btn.disabled = false;
      btn.textContent = 'เข้าสู่ระบบ';
    }
  }

  // Enter key handling on both fields
  function clearError() {
    document.getElementById('usr').classList.remove('error');
    document.getElementById('pwd').classList.remove('error');
    document.getElementById('err').textContent = '';
  }
  document.getElementById('usr').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      e.preventDefault();
      if (document.getElementById('pwd').value) doLogin();
      else document.getElementById('pwd').focus();
    }
    clearError();
  });
  document.getElementById('pwd').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLogin();
    clearError();
  });

  // Auto-focus on username
  document.getElementById('usr').focus();
</script>
</body>
</html>
