<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Production History · NNTN</title>
<link rel="stylesheet" href="/nntn/shared/nntn-tokens.css">
<script src="/nntn/auth.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  body { margin:0; background: var(--nntn-color-bg); font-family: var(--nntn-font-family); color: var(--nntn-color-text); font-size:var(--nntn-font-md); }
  .content { padding: var(--nntn-space-6); max-width:1400px; margin:0 auto; }
  .page-head { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:var(--nntn-space-5); gap:var(--nntn-space-4);}
  .page-head h1 { font-size:var(--nntn-font-2xl); font-weight:var(--nntn-weight-semibold); margin:0 0 var(--nntn-space-1); }
  .page-head .meta { color:var(--nntn-color-text-subdued); font-size:var(--nntn-font-sm); }

  /* KPI */
  .kpi-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(200px,1fr)); gap:var(--nntn-space-4); margin-bottom:var(--nntn-space-5); }
  .kpi { background:var(--nntn-color-surface); border:1px solid var(--nntn-color-border); border-radius:var(--nntn-radius-md); padding:var(--nntn-space-4); }
  .kpi-label { font-size:var(--nntn-font-xs); color:var(--nntn-color-text-subdued); text-transform:uppercase; letter-spacing:0.05em; font-weight:var(--nntn-weight-medium); }
  .kpi-value { font-size:var(--nntn-font-2xl); font-weight:var(--nntn-weight-semibold); margin-top:var(--nntn-space-2); }
  .kpi-delta { font-size:var(--nntn-font-xs); margin-top:var(--nntn-space-1); color:var(--nntn-color-text-subdued); }

  /* Filter */
  .filters { background:var(--nntn-color-surface); border:1px solid var(--nntn-color-border); border-radius:var(--nntn-radius-md) var(--nntn-radius-md) 0 0; border-bottom:none; padding:var(--nntn-space-3) var(--nntn-space-4); display:flex; gap:var(--nntn-space-3); align-items:center; flex-wrap:wrap; }
  .tab-row { display:flex; gap:var(--nntn-space-1); }
  .tab { padding:var(--nntn-space-2) var(--nntn-space-3); font-size:var(--nntn-font-sm); color:var(--nntn-color-text-subdued); cursor:pointer; border-radius:var(--nntn-radius-sm); }
  .tab.active { background:var(--nntn-color-info-bg); color:var(--nntn-color-info); font-weight:var(--nntn-weight-medium); }
  .search { flex:1; min-width:200px; padding:var(--nntn-space-2) var(--nntn-space-3); border:1px solid var(--nntn-color-border-strong); border-radius:var(--nntn-radius-md); font-family:inherit; font-size:var(--nntn-font-sm); }

  /* Table */
  .index-table { background:var(--nntn-color-surface); border:1px solid var(--nntn-color-border); border-radius:0 0 var(--nntn-radius-md) var(--nntn-radius-md); overflow:hidden; }
  .index-table table { width:100%; border-collapse:collapse; }
  .index-table th, .index-table td { text-align:left; padding:var(--nntn-space-3) var(--nntn-space-4); border-bottom:1px solid var(--nntn-color-border-subdued); font-size:var(--nntn-font-sm); }
  .index-table th { background:var(--nntn-color-surface-subdued); font-weight:var(--nntn-weight-semibold); color:var(--nntn-color-text-subdued); text-transform:uppercase; font-size:var(--nntn-font-xs); letter-spacing:0.05em; }
  .index-table tbody tr { cursor:pointer; transition: background var(--nntn-transition-fast); }
  .index-table tbody tr:hover { background:var(--nntn-color-surface-hover); }
  .index-table tbody tr:last-child td { border-bottom:none; }
  .cell-sku { font-family:var(--nntn-font-family-mono); font-size:var(--nntn-font-xs); color:var(--nntn-color-text-subdued); }
  .cell-primary { font-weight:var(--nntn-weight-medium); }

  .badge { display:inline-flex; align-items:center; gap:4px; padding:2px 8px; border-radius:var(--nntn-radius-full); font-size:var(--nntn-font-xs); font-weight:var(--nntn-weight-medium); }
  .badge--success { background:var(--nntn-color-success-bg); color:var(--nntn-color-success); }
  .badge--warning { background:var(--nntn-color-warning-bg); color:var(--nntn-color-warning); }
  .badge--info { background:var(--nntn-color-info-bg); color:var(--nntn-color-info); }
  .badge--critical { background:var(--nntn-color-critical-bg); color:var(--nntn-color-critical); }
  .badge--neutral { background:var(--nntn-color-surface-subdued); color:var(--nntn-color-text-subdued); border:1px solid var(--nntn-color-border); }

  /* Drawer */
  .drawer-bg { position:fixed; inset:0; background:rgba(0,0,0,0.2); z-index:var(--nntn-z-modal); display:none; }
  .drawer-bg.open { display:block; }
  .drawer { position:fixed; top:0; right:0; width:480px; max-width:100vw; height:100vh; background:var(--nntn-color-surface); box-shadow:var(--nntn-shadow-lg); z-index:calc(var(--nntn-z-modal) + 1); display:flex; flex-direction:column; transform:translateX(100%); transition: transform var(--nntn-transition-base); }
  .drawer.open { transform:translateX(0); }
  .drawer-head { padding:var(--nntn-space-5); border-bottom:1px solid var(--nntn-color-border); display:flex; justify-content:space-between; align-items:flex-start; gap:var(--nntn-space-3); }
  .drawer-title { font-size:var(--nntn-font-lg); font-weight:var(--nntn-weight-semibold); margin:0; }
  .drawer-sub { color:var(--nntn-color-text-subdued); font-size:var(--nntn-font-sm); margin-top:var(--nntn-space-1); }
  .drawer-close { background:none; border:none; font-size:24px; cursor:pointer; color:var(--nntn-color-text-subdued); padding:0; line-height:1; }
  .drawer-body { padding:var(--nntn-space-5); overflow-y:auto; flex:1; }

  .sect-title { font-size:var(--nntn-font-sm); font-weight:var(--nntn-weight-semibold); color:var(--nntn-color-text-subdued); text-transform:uppercase; letter-spacing:0.05em; margin:0 0 var(--nntn-space-3); }
  .io-grid { display:grid; grid-template-columns:1fr 1fr; gap:var(--nntn-space-4); margin-bottom:var(--nntn-space-5); }
  .io-card { background:var(--nntn-color-surface-subdued); padding:var(--nntn-space-3); border-radius:var(--nntn-radius-md); }
  .io-card-label { font-size:var(--nntn-font-xs); color:var(--nntn-color-text-subdued); }
  .io-card-value { font-weight:var(--nntn-weight-semibold); font-size:var(--nntn-font-lg); margin-top:2px; }
  .io-card-meta { font-size:var(--nntn-font-xs); color:var(--nntn-color-text-subdued); margin-top:var(--nntn-space-1); font-family:var(--nntn-font-family-mono);}

  .timeline { display:flex; flex-direction:column; gap:0; border-left:2px solid var(--nntn-color-border); padding-left:var(--nntn-space-5); margin-left:var(--nntn-space-2); }
  .evt { position:relative; padding:var(--nntn-space-3) 0; }
  .evt::before { content:""; position:absolute; left:calc(-1 * var(--nntn-space-5) - 5px); top:18px; width:8px; height:8px; border-radius:var(--nntn-radius-full); background:var(--nntn-color-primary); border:2px solid var(--nntn-color-surface); }
  .evt-title { font-weight:var(--nntn-weight-medium); font-size:var(--nntn-font-sm); }
  .evt-meta { font-size:var(--nntn-font-xs); color:var(--nntn-color-text-subdued); margin-top:2px; }
  .evt-body { font-size:var(--nntn-font-sm); color:var(--nntn-color-text-subdued); margin-top:var(--nntn-space-1); }

  @media (max-width:900px) { .drawer { width:100%; } }
</style>
</head>
<body class="nntn-scope">

<div class="content">
      <div class="page-head">
        <div>
          <h1>Production History</h1>
          <div class="meta">บันทึกการผลิตทั้งหมด · ปิดหม้อ · แปรรูป · อัปเดตทุก run</div>
        </div>
      </div>

      <div class="kpi-grid">
        <div class="kpi"><div class="kpi-label">Total runs</div><div class="kpi-value" id="k-total">—</div><div class="kpi-delta" id="k-total-sub"></div></div>
        <div class="kpi"><div class="kpi-label">วันนี้</div><div class="kpi-value" id="k-today">—</div><div class="kpi-delta" id="k-today-sub"></div></div>
        <div class="kpi"><div class="kpi-label">แปรรูป</div><div class="kpi-value" id="k-repack">—</div><div class="kpi-delta" id="k-repack-sub"></div></div>
        <div class="kpi"><div class="kpi-label">ปิดหม้อ</div><div class="kpi-value" id="k-cook">—</div><div class="kpi-delta" id="k-cook-sub"></div></div>
      </div>

      <div class="filters">
        <div class="tab-row">
          <div class="tab active" data-type="all">ทั้งหมด</div>
          <div class="tab" data-type="repack">♻️ แปรรูป</div>
          <div class="tab" data-type="cook">🍲 ปิดหม้อ</div>
        </div>
        <input class="search" id="search" placeholder="ค้นหา SKU หรือ ชื่อ...">
      </div>

      <div class="index-table">
        <table>
          <thead>
            <tr><th>เวลา</th><th>ประเภท</th><th>Output</th><th>จำนวน</th><th>น้ำหนัก</th><th>คลัง</th><th>Status</th></tr>
          </thead>
          <tbody id="rows">
            <tr><td colspan="7" style="text-align:center; color:var(--nntn-color-text-subdued); padding:var(--nntn-space-8);">⏳ โหลด...</td></tr>
          </tbody>
        </table>
      </div>
</div>

<div class="drawer-bg" id="drawer-bg" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-head">
    <div>
      <div class="drawer-title" id="d-title">—</div>
      <div class="drawer-sub" id="d-sub">—</div>
    </div>
    <button class="drawer-close" onclick="closeDrawer()">×</button>
  </div>
  <div class="drawer-body" id="d-body">
    <div style="text-align:center; color:var(--nntn-color-text-subdued); padding:var(--nntn-space-6);">⏳ โหลด...</div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://emjqulzikpxorvpaaiww.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVtanF1bHppa3B4b3J2cGFhaXd3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNTgzNDAsImV4cCI6MjA5MDYzNDM0MH0.BoslF10vIufPYucuHub_czSxzAhZ9u3nTDQjwgC7I5M';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let allRuns = [];
let currentFilter = 'all';

async function load() {
  const { data, error } = await sb.from('v_production_history').select('*').limit(500);
  if (error) { console.error(error); document.getElementById('rows').innerHTML = `<tr><td colspan="7" style="color:var(--nntn-color-critical); text-align:center; padding:var(--nntn-space-6)">❌ โหลดไม่ได้: ${error.message}</td></tr>`; return; }
  allRuns = data || [];
  renderKPI();
  renderRows();
}

function renderKPI() {
  const today = new Date().toISOString().slice(0,10);
  const todayRuns = allRuns.filter(r => r.run_at?.startsWith(today));
  document.getElementById('k-total').textContent = allRuns.length;
  document.getElementById('k-total-sub').textContent = 'all time';
  document.getElementById('k-today').textContent = todayRuns.length;
  document.getElementById('k-today-sub').textContent = today;
  const repackCount = allRuns.filter(r => r.run_type === 'repack').length;
  const cookCount = allRuns.filter(r => r.run_type === 'cook').length;
  document.getElementById('k-repack').textContent = repackCount;
  document.getElementById('k-cook').textContent = cookCount;
  const repackKg = allRuns.filter(r => r.run_type === 'repack').reduce((s,r)=>s+(+r.output_kg||0),0);
  const cookKg = allRuns.filter(r => r.run_type === 'cook').reduce((s,r)=>s+(+r.output_kg||0),0);
  document.getElementById('k-repack-sub').textContent = `${repackKg.toFixed(2)} กก. total`;
  document.getElementById('k-cook-sub').textContent = `${cookKg.toFixed(2)} กก. total`;
}

function renderRows() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  const filtered = allRuns.filter(r => {
    if (currentFilter !== 'all' && r.run_type !== currentFilter) return false;
    if (!q) return true;
    const hay = `${r.output_sku||''} ${r.output_name||''} ${r.notes||''}`.toLowerCase();
    return hay.includes(q);
  });
  const tbody = document.getElementById('rows');
  if (filtered.length === 0) {
    tbody.innerHTML = `<tr><td colspan="7" style="text-align:center; color:var(--nntn-color-text-subdued); padding:var(--nntn-space-8)">📭 ไม่มี runs ที่ตรงเงื่อนไข</td></tr>`;
    return;
  }
  tbody.innerHTML = filtered.map(r => {
    const d = new Date(r.run_at);
    const date = `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}`;
    const time = `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    const typeIcon = r.run_type === 'repack' ? '♻️ แปรรูป' : '🍲 ปิดหม้อ';
    const statusBadge = r.status === 'reverted'
      ? '<span class="badge badge--critical">Reverted</span>'
      : '<span class="badge badge--neutral">Complete</span>';
    return `<tr onclick="openDrawer('${r.run_id}')">
      <td><div>${time}</div><div style="color:var(--nntn-color-text-subdued); font-size:var(--nntn-font-xs)">${date}</div></td>
      <td>${typeIcon}</td>
      <td><div class="cell-primary">${r.output_name||'—'}</div><div class="cell-sku">${r.output_sku||''}</div></td>
      <td>${r.output_bags||0} ถุง</td>
      <td>${(+r.output_kg||0).toFixed(2)} กก.</td>
      <td>คลัง ${r.warehouse||'—'}</td>
      <td>${statusBadge}</td>
    </tr>`;
  }).join('');
}

// Drawer — detail with timeline
async function openDrawer(runId) {
  const run = allRuns.find(r => r.run_id === runId);
  if (!run) return;
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawer-bg').classList.add('open');
  const d = new Date(run.run_at);
  document.getElementById('d-title').textContent = run.run_type === 'repack' ? `♻️ Repack Run` : `🍲 Cook Run`;
  document.getElementById('d-sub').textContent = `${run.output_sku||''} ${run.output_name||''} · ${d.toLocaleString('th-TH')}`;

  const body = document.getElementById('d-body');
  body.innerHTML = '<div style="text-align:center; color:var(--nntn-color-text-subdued); padding:var(--nntn-space-6);">⏳ โหลด timeline...</div>';

  // Fetch output bags for this run
  let bagsHtml = '';
  let timelineHtml = '';
  try {
    if (run.run_type === 'repack') {
      // Output bags from catch_weight matching item_id + run_at
      const runTimeStart = new Date(new Date(run.run_at).getTime() - 2000).toISOString();
      const runTimeEnd = new Date(new Date(run.run_at).getTime() + 2000).toISOString();
      const { data: outBags } = await sb.from('catch_weight')
        .select('id, weight_g, warehouse, status, created_at')
        .eq('item_id', run.output_item_id)
        .eq('source', 'web-process')
        .gte('created_at', runTimeStart)
        .lte('created_at', runTimeEnd)
        .order('created_at');
      const bags = outBags || [];
      bagsHtml = `<h3 class="sect-title">Output bags (${bags.length})</h3>
        <div style="display:grid; grid-template-columns:repeat(auto-fill, minmax(120px, 1fr)); gap:var(--nntn-space-2); margin-bottom:var(--nntn-space-5);">
        ${bags.slice(0,20).map(b => `<div class="badge badge--info" style="justify-content:center; padding:var(--nntn-space-2)">#${b.id} · ${(+b.weight_g/1000).toFixed(2)}kg</div>`).join('')}
        ${bags.length > 20 ? `<div class="badge badge--neutral" style="justify-content:center; padding:var(--nntn-space-2)">+ ${bags.length-20} more</div>` : ''}
        </div>`;

      // Timeline — fetch Repacked source bags + output bags
      const { data: inputBags } = await sb.from('catch_weight')
        .select('id, weight_g, updated_at, items(name,sku)')
        .eq('status', '🔄 Repacked')
        .gte('updated_at', runTimeStart)
        .lte('updated_at', runTimeEnd);
      const events = [];
      (inputBags || []).forEach(b => {
        events.push({
          title: `🔄 Status changed — Bag #${b.id}`,
          meta: `${new Date(b.updated_at).toLocaleString('th-TH')} · system`,
          body: `${b.items?.name||''} (${b.items?.sku||''}) · ${(+b.weight_g/1000).toFixed(2)}kg · ✅ In Stock → 🔄 Repacked`
        });
      });
      events.push({
        title: `♻️ Repacked — ${bags.length} output bags created`,
        meta: `${new Date(run.run_at).toLocaleString('th-TH')} · source: web-process`,
        body: `→ ${run.output_sku} ${run.output_name} · ${(+run.output_kg).toFixed(2)} กก. · คลัง ${run.warehouse}`
      });
      events.sort((a,b)=>b.meta.localeCompare(a.meta));
      timelineHtml = `<h3 class="sect-title">Timeline</h3><div class="timeline">${events.map(e => `
        <div class="evt">
          <div class="evt-title">${e.title}</div>
          <div class="evt-meta">${e.meta}</div>
          <div class="evt-body">${e.body}</div>
        </div>`).join('')}</div>`;
    } else {
      // Cook
      const { data: outBags } = await sb.from('catch_weight')
        .select('id, weight_g, warehouse, items(name,sku)')
        .eq('cook_session_id', run.cook_session_id)
        .order('created_at');
      const bags = outBags || [];
      bagsHtml = `<h3 class="sect-title">Output bags (${bags.length})</h3>
        <div style="display:grid; grid-template-columns:repeat(auto-fill, minmax(160px, 1fr)); gap:var(--nntn-space-2); margin-bottom:var(--nntn-space-5);">
        ${bags.map(b => `<div class="badge badge--info" style="justify-content:center; padding:var(--nntn-space-2)">#${b.id} · ${b.items?.sku||''} · ${(+b.weight_g/1000).toFixed(2)}kg</div>`).join('')}
        </div>`;
      timelineHtml = `<h3 class="sect-title">Timeline</h3><div class="timeline">
        <div class="evt">
          <div class="evt-title">🍲 Cook session created</div>
          <div class="evt-meta">${new Date(run.run_at).toLocaleString('th-TH')} · status: ${run.status||'—'}</div>
          <div class="evt-body">Output: ${bags.length} bags · ${(+run.output_kg).toFixed(2)} กก. · คลัง ${run.warehouse||'—'}</div>
        </div></div>`;
    }

    const yieldNote = run.run_type === 'repack'
      ? `<div class="nntn-banner nntn-banner--success" style="margin-bottom:var(--nntn-space-5)"><div><div class="nntn-banner-title">✅ Complete</div><div class="nntn-banner-body">${run.output_bags} ถุง × ${(+run.output_kg/run.output_bags*1000).toFixed(0)}g avg · ${(+run.output_kg).toFixed(2)} กก. total</div></div></div>`
      : `<div class="nntn-banner nntn-banner--info" style="margin-bottom:var(--nntn-space-5)"><div><div class="nntn-banner-title">🍲 Cook session</div><div class="nntn-banner-body">Status: ${run.status||'—'} · ${run.output_bags} output bags</div></div></div>`;

    body.innerHTML = `
      <div class="io-grid">
        <div class="io-card">
          <div class="io-card-label">OUTPUT</div>
          <div class="io-card-value">${run.output_bags||0} ถุง</div>
          <div class="io-card-meta">${run.output_sku||'—'} · ${(+run.output_kg).toFixed(2)} กก.</div>
        </div>
        <div class="io-card">
          <div class="io-card-label">CLANG</div>
          <div class="io-card-value">คลัง ${run.warehouse||'—'}</div>
          <div class="io-card-meta">${run.run_type}</div>
        </div>
      </div>
      ${yieldNote}
      ${bagsHtml}
      ${timelineHtml}
      ${run.notes ? `<div style="margin-top:var(--nntn-space-5); padding:var(--nntn-space-3); background:var(--nntn-color-surface-subdued); border-radius:var(--nntn-radius-md);"><div class="sect-title" style="margin-bottom:var(--nntn-space-2)">Notes</div><div style="font-size:var(--nntn-font-sm)">${run.notes}</div></div>` : ''}
    `;
  } catch (e) {
    body.innerHTML = `<div class="nntn-banner nntn-banner--critical"><div><div class="nntn-banner-title">❌ Error loading detail</div><div class="nntn-banner-body">${e.message||e}</div></div></div>`;
  }
}

function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawer-bg').classList.remove('open');
}

// Filter handlers
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    currentFilter = t.dataset.type;
    renderRows();
  });
});
document.getElementById('search').addEventListener('input', renderRows);

// Kick off
load();
</script>
</body>
</html>
